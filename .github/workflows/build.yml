name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ALIAS: ${{ secrets.ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: set up Gradle 9.1.0
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.1.0'

    - name: Decode release keystore
      if: ${{ secrets.SIGNING_KEY != '' }}
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      run: |
        printf '%s' "$SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/release.keystore"
        echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

    - name: Build release APK
      if: ${{ secrets.SIGNING_KEY != '' }}
      run: gradle assembleRelease

    - name: Build debug APK
      if: ${{ secrets.SIGNING_KEY == '' }}
      run: gradle assembleDebug

    - name: Upload release APK
      if: ${{ secrets.SIGNING_KEY != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: SmoothIsland-Release-Signed
        path: app/build/outputs/apk/release/*.apk

    - name: Upload debug APK
      if: ${{ secrets.SIGNING_KEY == '' }}
      uses: actions/upload-artifact@v4
      with:
        name: SmoothIsland-Debug
        path: app/build/outputs/apk/debug/*.apk
